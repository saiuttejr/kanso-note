steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/kanso:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/kanso:latest'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/kanso'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'kanso'
      - '--image'
      - 'gcr.io/$PROJECT_ID/kanso:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'

images:
  - 'gcr.io/$PROJECT_ID/kanso:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/kanso:latest'

options:
  machineType: 'N1_HIGHCPU_8'

substitutions:
  PROJECT_ID: 'your-project-id'
