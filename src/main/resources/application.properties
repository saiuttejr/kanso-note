# =====================================================================
# Kanso Personal Finance Tracker — Offline-First Configuration
# Interview talking point: all defaults enforce offline operation.
# The server binds to localhost only, H2 persists to a local file,
# and no external network call is made anywhere in the app.
# =====================================================================

# --- Server: bind to localhost only (blocks external access) ---
server.address=127.0.0.1
server.port=${PORT:8080}

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- File upload limits ---
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# --- H2 file-mode database (all data stays on-device) ---
# Design decision: H2 in file mode gives us a real SQL database with zero
# install steps. The DB file lives in ./data/kanso-db so it survives restarts.
# AUTO_SERVER=TRUE lets the H2 console connect while the app is running.
spring.datasource.url=jdbc:h2:file:./data/kanso-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
# validate mode ensures Flyway owns the schema; Hibernate only checks it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- H2 Console (local dev convenience, localhost only) ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# --- Flyway (version-controlled migrations) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Kanso custom: local storage paths ---
kanso.storage.upload-dir=./data/uploads
kanso.storage.db-path=./data/kanso-db

# --- Logging ---
logging.level.com.bankingoop.finance=DEBUG
logging.level.org.flywaydb=INFO
